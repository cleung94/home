<!DOCTYPE HTML>
<html>
<head>
	<title>Moka & Co Review | Christopher Leung</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="../assets/css/main.css" />

	<style>

	/* ===== RETURN SCORE ===== */
	.return-score {
		display: grid;
		grid-template-columns: repeat(3, minmax(90px, 1fr));
		gap: 1em;
		margin-top: 0.75em;
	}

	.return-option {
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 0.45em;
		padding: 1.1em 0.9em;
		border-radius: 1em;
		background: rgba(255,255,255,0.72);
		border: 1px solid rgba(74,111,134,0.12);
		box-shadow: 0 10px 22px rgba(60,80,100,0.05);
		opacity: 0.45;
		transform: scale(0.98);
		transition: all 0.25s ease;
	}

	.return-option.active {
		opacity: 1;
		transform: scale(1);
		border-color: rgba(74,111,134,0.26);
		box-shadow: 0 14px 28px rgba(60,80,100,0.09);
	}

	.return-emoji { font-size: 2rem; }
	.return-label {
		font-size: 0.9rem;
		font-weight: 700;
		text-transform: uppercase;
		color: #51616d;
	}

	/* ===== FIXED HERO LAYOUT ===== */
	.restaurant-rating-hero {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 3rem;
		flex-wrap: wrap;
		margin-top: 1.25em;
	}

	.restaurant-rating-score {
		display: inline-flex;
		align-items: center;
		gap: 0.75em;
		padding: 0.9em 1.15em;
		border-radius: 1em;
		background: linear-gradient(145deg,#fff,#eef3f7);
		border: 1px solid rgba(74,111,134,0.16);
		box-shadow: 0 12px 28px rgba(60,80,100,0.08);
	}

	.restaurant-return-block {
		display: flex;
		flex-direction: column;
		align-items: center;
		text-align: center;
		gap: 0.5em;
	}

	.return-question { margin: 0; }

	@media screen and (max-width: 736px) {
		.return-score { grid-template-columns: 1fr; }
	}

	</style>
</head>

<body class="is-preload blog-tone">

<div id="wrapper">
<div id="main">
<div class="inner">

<header id="header">
	<a href="../index.html" class="logo"><strong>Christopher Leung</strong></a>
</header>

<section class="blog-post-luxe">
<div class="blog-post-luxe-media">
	<img src="photos/MokaAndCo.jpg" alt="Moka & Co" />
</div>

<div class="blog-post-luxe-panel">
	<span class="blog-kicker-luxe">Restaurant Review</span>
	<h1>Moka & Co</h1>

	<p class="blog-subtitle-luxe">
		A structured coffeehouse review in Fremont, California.
	</p>

	<div class="blog-post-meta-luxe">
		<span>April 2026</span>
		<span>Coffee House Review</span>
	</div>

	<!-- ===== FIXED SECTION ===== -->
	<div class="restaurant-rating-hero">

		<div class="restaurant-rating-score">
			<div class="restaurant-stars" id="overallStars">
				<span class="star">★</span>
				<span class="star">★</span>
				<span class="star">★</span>
				<span class="star">★</span>
				<span class="star">★</span>
			</div>

			<div class="restaurant-score-text">
				<span id="overallScore">0.0 / 10</span>
				<span>Overall Rating</span>
			</div>
		</div>

		<div class="restaurant-return-block">

			<p class="return-question"><strong>Would I come back?</strong></p>

			<div class="return-score" data-return-score="3">
				<div class="return-option" data-value="1">
					<span class="return-emoji">😕</span>
					<span class="return-label">No</span>
				</div>

				<div class="return-option" data-value="2">
					<span class="return-emoji">🙂</span>
					<span class="return-label">Maybe</span>
				</div>

				<div class="return-option" data-value="3">
					<span class="return-emoji">😄</span>
					<span class="return-label">Yes</span>
				</div>
			</div>

		</div>

	</div>

</div>
</section>

</div>
</div>
</div>

</body>
</html>
