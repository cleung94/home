<!DOCTYPE HTML>
<html>
<head>
<title>Contact | Christopher Leung</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="assets/css/main.css" />

<style>

.contact-wrapper{
display:flex;
justify-content:center;
margin-top:40px;
}

.contact-card{

width:min(900px,100%);
padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.6);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.7);

box-shadow:
0 15px 35px rgba(74,111,134,0.15);

}

.contact-title{
text-align:center;
margin-bottom:35px;
}

.contact-title h1{
color:#4a6f86;
margin-bottom:10px;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.contact-field{
display:flex;
flex-direction:column;
}

.contact-field.full{
grid-column:1 / -1;
}

.contact-field label{
font-weight:600;
margin-bottom:6px;
}

.contact-field input,
.contact-field textarea{

background:rgba(255,255,255,0.7);
border:1px solid #d9e2e8;

padding:10px;
border-radius:6px;

}

.contact-field textarea{
min-height:180px;
resize:vertical;
}

.send-btn{

margin-top:25px;
display:flex;
justify-content:center;

}

.send-btn button{

background:#4a6f86;
color:white;

border:none;
padding:12px 30px;

border-radius:25px;

font-size:16px;

cursor:pointer;

transition:all .25s ease;

}

.send-btn button:hover{
background:#3e5e71;
}

@media(max-width:700px){

.contact-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div id="wrapper">

<div id="main">
<div class="inner">

<header id="header">
<a href="index.html" class="logo"><strong>Christopher Leung</strong></a>
</header>

<section>

<div class="contact-wrapper">

<div class="contact-card">

<div class="contact-title">
<h1>Contact Me</h1>
<p>If you'd like to reach out regarding opportunities, collaborations, or questions about my work.</p>
</div>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<div class="contact-grid">

<div class="contact-field">
<label>First Name</label>
<input type="text" name="firstName" required>
</div>

<div class="contact-field">
<label>Last Name</label>
<input type="text" name="lastName" required>
</div>

<div class="contact-field full">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="contact-field full">
<label>Company</label>
<input type="text" name="company">
</div>

<div class="contact-field full">
<label>Message</label>
<textarea name="message" required></textarea>
</div>

</div>

<input type="hidden" name="_subject" value="New Portfolio Contact Message">

<div class="send-btn">
<button type="submit">Send Message</button>
</div>

</form>

</div>

</div>

</section>

</div>
</div>

</div>

</body>
</html>
